  <link rel="stylesheet" type="text/css" href="styles.css">

<body>

  <main>
    <header>
        <h1>Welcome</h1>
        <p>This is a simple web page example demonstrating how the z-index property can place the modal above everything.</p>
    </header>
    <div class="about" onclick="modalDisplay()">
        <h1>about</h1>
        <p>this card demonstrates how regular page content can stays behind the modal</p>
    </div>
  </main>

  <div class="modal">
    <div class="success">
    <h1><i class="fa-regular fa-circle-check" style="color: rgb(255, 212, 59);"></i></h1>
    <p>Success Message Title</p>
    <p>Well done, you pressed the button</p>
    <div class="btn-group">
        <button onclick="modalClose() ">ok</button>
    </div>
    
    </div>
  </div>
