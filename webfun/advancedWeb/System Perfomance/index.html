<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content>
        <link rel="stylesheet" type="text/css" href="styles.css">
        <title>Document</title>
    </head>
    <body>
        <main>
            <h1>System Perfomance Monitor</h1>
            <div id="container">
                <div class="card">
                    <label for="cpu">CPU Usage</label>
                    <meter id="cpu" min="0" max="100" low="25" high="50"
                        value="65">65%</meter>
                    <span>65% usage</span>
                </div>
                <div class="card">
                    <label for="ram">RAM Usage</label>
                    <meter id="ram" min="0" max="16" low="4" high="12"
                        value="6">6</meter>
                    <span>6 GB usage of 16 GB used</span>
                </div>
                <div class="card">
                    <label for="disk">Disk Usage</label>
                    <meter id="dsik" min="0" max="512" low="25" high="200"
                        value="420">420</meter>
                    <span>420 GB usage of 512 GB used</span>
                </div>
                <div class="card">
                    <label for="ram">File Transfer</label>
                    <progress id="file" value="70" max="100">70%</progress>
                    <span>70% completed</span>
                </div>

                <div class="card">
                    <label for="network">Network Activity</label>
                    <progress id="network" value="30" max="100">30%</progress>
                    <span>Current load: 30%</span>
                </div>

                <div class="card">
                    <label for="system">System Task</label>
                    <progress id="system" value="45" max="100">45%</progress>
                    <span>Processing task: 45%</span>
                </div>
            </div>
        </main>
        <script src="scripts.js"></script>
    </body>
</html>
