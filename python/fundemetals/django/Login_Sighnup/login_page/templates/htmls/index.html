<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Login</title>
</head>

<body class="bg-slate-50 text-slate-900 flex flex-col min-h-screen antialiased">
    <!-- Header -->
    <header class="bg-white border-b border-slate-200 py-4 px-6 flex justify-between items-center shadow-sm">
        <h1 class="text-xl font-bold tracking-tight text-purple-600">Your Company</h1>
        <a href="#" class="text-sm font-medium text-slate-600 hover:text-purple-600 transition-colors">Help</a>
    </header>

    <!-- Main Content Box -->
    <main class="flex-grow flex items-center justify-center p-4 sm:p-6 lg:p-8">
        <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-xl shadow-purple-100 border border-slate-100">
            <div class="text-center mb-8">
                <h2 class="text-2xl font-bold tracking-tight text-slate-900">Welcome back</h2>
                <p class="text-sm text-slate-500 mt-2">Please enter your details to sign in</p>
            </div>

            <!-- Login Form -->
            <form action="{% url 'login_page:check_user' %}" method="post" class="space-y-6">
                {% csrf_token %}
                <!-- Email Field -->
                <div>
                    <label for="Email" class="block text-sm font-medium text-slate-700 mb-1.5">Email address</label>
                    <input type="email" id="Email" name="email" required autocomplete="email"
                        class="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-lg text-sm placeholder-slate-400 focus:outline-none focus:border-purple-500 focus:ring-4 focus:ring-purple-100 transition-all">
                </div>

                <!-- Password Field -->
                <div>
                    <div class="flex justify-between items-center mb-1.5">
                        <label for="Password" class="block text-sm font-medium text-slate-700">Password</label>
                        <a href="#" class="text-xs font-semibold text-purple-600 hover:text-purple-500">Forgot
                            password?</a>
                    </div>
                    <input type="password" id="Password" name="password" required autocomplete="current-password"
                        class="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-lg text-sm placeholder-slate-400 focus:outline-none focus:border-purple-500 focus:ring-4 focus:ring-purple-100 transition-all">
                </div>

                <!-- Remember Me Checkbox -->
                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox"
                        class="h-4 w-4 rounded border-slate-300 text-purple-600 focus:ring-purple-500">
                    <label for="remember-me" class="ml-2 block text-sm text-slate-600">Remember me</label>
                </div>

                <!-- Submit Button -->
                <div>
                    <button type="submit"
                        class="w-full py-2.5 px-4 bg-purple-600 hover:bg-purple-700 text-white font-semibold rounded-lg text-sm shadow-sm hover:shadow-purple-200 focus:outline-none focus:ring-4 focus:ring-purple-200 transition-all transform active:scale-[0.98]">
                        Sign In
                    </button>
                </div>
            </form>

            <!-- Sign Up Prompt -->
            <p class="text-center text-sm text-slate-500 mt-8">
                Don't have an account?
                <a href="{% url 'login_page:signup' %}" class="font-semibold text-purple-600 hover:text-purple-500">Sign up</a>
            </p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-200 py-4 px-6 text-center text-xs text-slate-500">
        <p>&copy; 2026 Your Company. All rights reserved.</p>
    </footer>
</body>

</html>
