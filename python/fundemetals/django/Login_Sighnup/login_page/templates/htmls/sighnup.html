
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Sign Up</title>
</head>

<body class="bg-slate-50 text-slate-900 flex flex-col min-h-screen antialiased">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 py-4 px-6 flex justify-between items-center shadow-sm">
        <h1 class="text-xl font-bold tracking-tight text-purple-600">Your Company</h1>
        <a href="#" class="text-sm font-medium text-slate-600 hover:text-purple-600 transition-colors">Help</a>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center p-4 sm:p-6 lg:p-8">
        <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-xl shadow-purple-100 border border-slate-100">

            <!-- Title -->
            <div class="text-center mb-8">
                <h2 class="text-2xl font-bold tracking-tight text-slate-900">
                    Create your account
                </h2>
                <p class="text-sm text-slate-500 mt-2">
                    Get started with your free account today
                </p>
            </div>

            <!-- Sign Up Form -->
            <form id="signupForm" action="{% url 'login_page:create_user' %}" method="post" class="space-y-5">
                {% csrf_token %}

                <!-- First Name / Last Name -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="first_name" class="block text-sm font-medium text-slate-700 mb-1.5">
                            First name
                        </label>
                        <input type="text" id="first_name" name="first_name" required autocomplete="given-name"
                            class="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-lg text-sm placeholder-slate-400 focus:outline-none focus:border-purple-500 focus:ring-4 focus:ring-purple-100 transition-all">
                    </div>

                    <div>
                        <label for="last_name" class="block text-sm font-medium text-slate-700 mb-1.5">
                            Last name
                        </label>
                        <input type="text" id="last_name" name="last_name" required autocomplete="family-name"
                            class="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-lg text-sm placeholder-slate-400 focus:outline-none focus:border-purple-500 focus:ring-4 focus:ring-purple-100 transition-all">
                    </div>
                </div>

                <!-- Email -->
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-700 mb-1.5">
                        Email address
                    </label>
                    <input type="email" id="email" name="email" required autocomplete="email"
                        class="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-lg text-sm placeholder-slate-400 focus:outline-none focus:border-purple-500 focus:ring-4 focus:ring-purple-100 transition-all">
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700 mb-1.5">
                        Password
                    </label>
                    <input type="password" id="password" name="password" required autocomplete="new-password"
                        pattern="^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&])[A-Za-z\d@$!%*#?&]{8,}$"
                        title="Must contain at least one letter, one number, one special character, and be at least 8 characters long."
                        class="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-lg text-sm placeholder-slate-400 focus:outline-none focus:border-purple-500 focus:ring-4 focus:ring-purple-100 transition-all">

                    <p class="text-[11px] text-slate-400 mt-1">
                        Min 8 chars, with letters, numbers & special characters (@$!%*#?&).
                    </p>
                </div>

                <!-- Confirm Password -->
                <div>
                    <label for="confirm_password" class="block text-sm font-medium text-slate-700 mb-1.5">
                        Confirm password
                    </label>
                    <input type="password" id="confirm_password" name="confirm_password" required
                        autocomplete="new-password"
                        class="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-lg text-sm placeholder-slate-400 focus:outline-none focus:border-purple-500 focus:ring-4 focus:ring-purple-100 transition-all">
                </div>

                <!-- Terms -->
                <div class="flex items-start">
                    <input id="terms" name="terms" type="checkbox" required
                        class="h-4 w-4 mt-0.5 rounded border-slate-300 text-purple-600 focus:ring-purple-500">

                    <label for="terms" class="ml-2 block text-sm text-slate-600">
                        I agree to the
                        <a href="#" class="font-semibold text-purple-600 hover:text-purple-500">
                            Terms of Service
                        </a>
                        and
                        <a href="#" class="font-semibold text-purple-600 hover:text-purple-500">
                            Privacy Policy
                        </a>
                    </label>
                </div>

                <!-- Submit Button -->
                <div class="pt-2">
                    <button type="submit"
                        class="w-full py-2.5 px-4 bg-purple-600 hover:bg-purple-700 text-white font-semibold rounded-lg text-sm shadow-sm hover:shadow-purple-200 focus:outline-none focus:ring-4 focus:ring-purple-200 transition-all transform active:scale-[0.98]">
                        Create Account
                    </button>
                </div>

            </form>

            <!-- Login Link -->
            <p class="text-center text-sm text-slate-500 mt-8">
                Already have an account?
                <a href="{% url 'login_page:login' %}" class="font-semibold text-purple-600 hover:text-purple-500">
                    Sign in
                </a>
            </p>

        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-200 py-4 px-6 text-center text-xs text-slate-500">
        <p>&copy; 2026 Your Company. All rights reserved.</p>
    </footer>

</body>

</html>
```
