<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Tailwind App</title>
</head>

<body class="bg-gray-50 text-gray-900 flex flex-col min-h-screen">
    <header class="bg-white border-b border-gray-200 p-4">
    </header>

    <main class="flex-grow container mx-auto p-4">
        <form action="{% url 'app1:chek_user'%}" method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label for="firstname" class="block text-gray-600 font-semibold mb-2">firstname:</label>
                <input type="text" id="username" name="firstname" class="w-full p-2 border border-gray-300 rounded"
                    required>
            </div>
            <div class="mb-4">
                <label for="lasttname" class="block text-gray-600 font-semibold mb-2">lasttname:</label>
                <input type="text" id="username" name="lastname" class="w-full p-2 border border-gray-300 rounded"
                    required>
            </div>
            <div class="mb-4">
                <label for="email" class="block text-gray-600 font-semibold mb-2">Email:</label>
                <input type="email" id="email" name="email" class="w-full p-2 border border-gray-300 rounded" required>
            </div>
            <div class="mb-4">
                <label for="password" class="block text-gray-600 font-semibold mb-2">Password:</label>
                <input type="password" id="password" name="password" class="w-full p-2 border border-gray-300 rounded"
                    required>
            </div>
            <button type="submit" class="bg-blue-500 text-white py-2 px-4 rounded hover:bg-blue-600">Sign Up</button>
        </form>
    </main>

    <footer class="bg-white border-t border-gray-200 p-4 text-center text-sm text-gray-600">
        <p>&copy; 2026 Your Company. All rights reserved.</p>
    </footer>
</body>

</html>
