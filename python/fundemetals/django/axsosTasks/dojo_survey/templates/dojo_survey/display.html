<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Form Submission Results">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Submission Details</title>
</head>

<body class="w-full h-screen bg-gray-900 flex justify-center items-center font-sans antialiased">
    <main class="w-full max-w-md p-8 bg-gray-800 rounded-xl shadow-lg border border-gray-700 mx-4">

        <!-- Header -->
        <div class="text-center mb-6 border-b border-gray-700 pb-4">
            <h1 class="text-xl font-bold text-white">Submission Received</h1>
            <p class="text-sm text-gray-400 mt-1">Here is the profile data you submitted.</p>
        </div>

        <!-- Data Display Container -->
        <div class="flex flex-col gap-4">

            <!-- Name Block -->
            <div class="bg-gray-700/50 p-3 rounded-lg border border-gray-700">
                <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Name</span>
                <p id="display-name" class="text-lg font-medium text-white mt-0.5">{{name}}</p>
            </div>

            <!-- Location Block -->
            <div class="bg-gray-700/50 p-3 rounded-lg border border-gray-700">
                <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Location</span>
                <p id="display-location" class="text-lg font-medium text-white mt-0.5">{{ location }}</p>
            </div>

            <!-- Language Block -->
            <div class="bg-gray-700/50 p-3 rounded-lg border border-gray-700">
                <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Favorite Language</span>
                <p id="display-language" class="text-lg font-medium text-blue-400 mt-0.5">{{ language }}</p>
            </div>

            <!-- Comment Block -->
            <div class="bg-gray-700/50 p-3 rounded-lg border border-gray-700">
                <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Comments</span>
                <p id="display-comment" class="text-sm text-gray-300 mt-1 italic whitespace-pre-line">{{comment}}</p>
            </div>

            <!-- Action Button -->
            <a href="/dojo_survey/"
                class="w-full mt-2 text-center bg-gray-700 hover:bg-gray-600 text-white font-medium py-2 px-4 rounded-md transition duration-200 active:scale-[0.98]">
                Go Back
            </a>

        </div>
    </main>


        
</body>

</html>
