<!doctype html>



<html lang="en">



<head>

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="/static/styles.css" />

    <title>Document</title>

</head>



<body
    class="bg-gradient-to-br from-orange-50 via-white to-orange-100 h-screen flex flex-col items-center justify-start font-sans">



    <div class="text-center m-10">

        <h1 class="text-4xl font-bold text-orange-600 mb-2">Guess the Number</h1>

        <p class="text-gray-600">Total Page Visits: {{ session['visits'] }}</p>

    </div>



    <main class="w-full h-2/3 p-6  flex items-center justify-center">

        <!-- THE CARD: bg_color variable changes the background based on server logic -->

        <div
            class="w-2/4 h-full {{ bg_color }} rounded-3xl shadow-2xl overflow-hidden border flex flex-col items-center justify-evenly border-orange-100 transition-all duration-300">



            <div class="text-center">

                <h2 class="text-4xl font-bold mb-2">Attempts: <span class="opacity-80">{{ session['attempts'] }}</span>
                </h2>

                <p class="text-2xl font-medium">{{ message }}</p>

            </div>



            {% if show_reset %}

            <!-- Show only the reset button if the user won -->

            <form action="/process" method="post">

                <button type="submit" name="action" value="reset"
                    class="bg-white text-green-600 font-bold px-10 py-4 rounded-xl shadow-lg hover:scale-105 transition-transform">

                    Play Again

                </button>

            </form>

            {% else %}

            <!-- Standard Game Form -->

            <form action="/process" method="post" class="flex flex-col items-center gap-6 w-full">

                <input id="inputText" type="number" name="find" placeholder="Try a Number ..."
                    class="w-1/4 bg-white placeholder:text-slate-400 text-slate-700 text-lg border border-slate-300 rounded-md px-4 py-3 text-center focus:outline-none focus:ring-2 focus:ring-orange-400 shadow-sm">



                <div class="flex items-center gap-4">

                    <button type="button" onclick="sub()"
                        class="rounded-md border text-black border-slate-300 py-2 px-6 text-sm bg-white hover:bg-red-400 hover:text-white transition-all shadow-sm">-2</button>



                    <button type="submit"
                        class="rounded-md border  border-slate-300 py-2 px-8 text-sm font-bold bg-slate-800 text-white hover:bg-slate-700 transition-all shadow-md">Check</button>



                    <button type="submit" name="action" value="reset"
                        class="bg-yellow-600 text-white px-6 py-2 text-sm rounded shadow-sm hover:bg-yellow-700 transition-all">Reset</button>



                    <button type="button" onclick="add()"
                        class="rounded-md text-black border border-slate-300 py-2 px-6 text-sm bg-white hover:bg-blue-400 hover:text-white transition-all shadow-sm">+2</button>

                </div>

            </form>

            {% endif %}

        </div>

    </main>



    <script type="text/javascript" src="{{ url_for('static', filename='scripts.js') }}"></script>
</body>



</html>
