<!doctype html>

<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/styles.css" />
    <title>Document</title>
</head>

<body
    class="bg-gradient-to-br from-orange-50 via-white to-orange-100 min-h-screen flex items-center justify-center font-sans">
    <main class="w-full max-w-4xl px-6">
        <!-- Page Header -->
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold text-orange-600 mb-2">User Directory</h1>
            <p class="text-gray-600 text-lg">
                Modern responsive table design with Tailwind CSS
            </p>
        </div>

        <!-- Table Container -->
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-orange-100">
            <!-- Table -->
            <table class="w-full">
                <!-- Header -->
                <thead class="bg-gradient-to-r from-orange-600 to-orange-500 text-white">
                    <tr>
                        <th class="px-8 py-5 text-left text-lg font-semibold tracking-wide uppercase">
                            First Name
                        </th>
                        <th class="px-8 py-5 text-left text-lg font-semibold tracking-wide uppercase">
                            Last Name
                        </th>
                    </tr>
                </thead>

                <!-- Body -->
                <tbody class="divide-y divide-orange-100">
                    <!-- iterate through users -->
                    {% for i in range(users|length) %}
                    <!-- for zebra rows -->
                    {% if i % 2 == 0 %}
                    <tr class="hover:bg-orange-50 transition-all duration-300">
                        {% else %}
                    </tr>

                    <tr class="bg-gray-50 hover:bg-orange-50 transition-all duration-300">
                        {% endif %}

                        <td class="px-8 py-5 text-gray-800 font-medium text-lg">
                            {{ users[i]['first_name'] }}
                        </td>

                        <td class="px-8 py-5 text-gray-600 text-lg">
                            {{ users[i]['last_name'] }}
                        </td>
                    </tr>

                    {% endfor %}
                </tbody>
            </table>
        </div>

        <!-- Footer -->
        <div class="text-center mt-6 text-sm text-gray-500">
            Total Users: {{ users|length }}
        </div>
    </main>
</body>

</html>
