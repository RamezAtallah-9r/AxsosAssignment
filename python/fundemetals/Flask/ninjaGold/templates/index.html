<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Ninja Gold Game</title>
</head>

<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <header class="py-8 text-center border-b border-slate-800">
        <h1
            class="text-4xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-red-500 uppercase">
            Ninja Gold Game
        </h1>
    </header>

    <main class="max-w-6xl mx-auto p-6">

        <!-- Gold Counter -->
        <div class="flex items-center justify-center mb-10">
            <div class="bg-slate-800 border-2 border-yellow-500/50 rounded-xl px-8 py-4 flex items-center gap-4">
                <span class="text-xl font-bold uppercase tracking-widest text-slate-400">Your Gold:</span>
                <!-- PLACEHOLDER FOR GOLD VARIABLE -->
                <span class="text-2xl font-mono font-bold text-yellow-400">{{ session['gold'] }}</span>
                <!-- Reset Button Form -->
                <form action="/reset" method="post" class="ml-4">
                    <button class="bg-slate-700 hover:bg-slate-600 text-s px-4 py-2 rounded shadow">Reset Game</button>
                </form>
            </div>

        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">

            <!-- Farm -->
            <div
                class="bg-slate-800 p-6 rounded-2xl border border-slate-700 hover:border-green-500 transition-all group shadow-lg">
                <form action="/process_money" method="post">
                    <input type="hidden" name="building" value="farm">
                    <h2 class="text-2xl font-bold mb-2 group-hover:text-green-400">Farm</h2>
                    <p class="text-slate-400 mb-6 text-sm italic">Earn 10-20 gold</p>
                    <button
                        class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded-lg transition-colors shadow-lg shadow-green-900/20">
                        Find Gold
                    </button>
                </form>
            </div>

            <!-- Cave -->
            <div
                class="bg-slate-800 p-6 rounded-2xl border border-slate-700 hover:border-blue-400 transition-all group shadow-lg">
                <form action="/process_money" method="post">
                    <input type="hidden" name="building" value="cave">
                    <h2 class="text-2xl font-bold mb-2 group-hover:text-blue-400">Cave</h2>
                    <p class="text-slate-400 mb-6 text-sm italic">Earn 5-15 gold</p>
                    <button
                        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition-colors shadow-lg shadow-blue-900/20">
                        Find Gold
                    </button>
                </form>
            </div>

            <!-- House -->
            <div
                class="bg-slate-800 p-6 rounded-2xl border border-slate-700 hover:border-purple-400 transition-all group shadow-lg">
                <form action="/process_money" method="post">
                    <input type="hidden" name="building" value="house">
                    <h2 class="text-2xl font-bold mb-2 group-hover:text-purple-400">House</h2>
                    <p class="text-slate-400 mb-6 text-sm italic">Earn 2-5 gold</p>
                    <button
                        class="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-3 rounded-lg transition-colors shadow-lg shadow-purple-900/20">
                        Find Gold
                    </button>
                </form>
            </div>

            <!-- Casino -->
            <div
                class="bg-slate-800 p-6 rounded-2xl border border-slate-700 hover:border-red-500 transition-all group shadow-lg">
                <form action="/process_money" method="post">
                    <input type="hidden" name="building" value="casino">
                    <h2 class="text-2xl font-bold mb-2 group-hover:text-red-500">Casino</h2>
                    <p class="text-slate-400 mb-6 text-sm italic">Earn/Lose 0-50 gold</p>
                    <button
                        class="w-full bg-red-600 hover:bg-red-500 text-white font-bold py-3 rounded-lg transition-colors shadow-lg shadow-red-900/20">
                        Gamble
                    </button>
                </form>
            </div>
        </div>

        <!-- Activity Log Area -->
        <div class="bg-slate-950 rounded-2xl border border-slate-800 p-4 shadow-inner">
            <h3 class="text-xs uppercase font-bold text-slate-500 mb-2 px-2">Activity Log</h3>
            <div
                class="w-full h-48 bg-slate-900/50 rounded-lg p-4 font-mono text-sm overflow-y-auto border border-slate-800">
                {% for act in activities %}
                <p class="{{ act.color }}"> > {{ act.message }}</p>
                {% else %}
                <p class="text-slate-500 italic">No activities yet...</p>
                {% endfor %}
            </div>
        </div>

    </main>
</body>

</html>
