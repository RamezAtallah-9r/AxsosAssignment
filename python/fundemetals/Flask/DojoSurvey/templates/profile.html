<!doctype html>

<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/styles.css" />
    <title>Document</title>
</head>

<body class="w-full min-h-screen flex justify-center items-center bg-slate-100 font-sans">
    <main
        class="bg-white w-full max-w-lg p-8 shadow-2xl shadow-cyan-500/10 rounded-2xl border border-slate-100 flex flex-col gap-6">

        <header class="text-center">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-cyan-100 text-cyan-600 mb-3">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5"
                    stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" />
                </svg>
            </div>
            <h1 class="text-3xl text-slate-800 font-bold tracking-tight">Submission Received</h1>
            <p class="text-sm text-slate-500 mt-1">Here is the information you provided</p>
        </header>

        <div class="flex flex-col gap-4 bg-slate-50 p-5 rounded-xl border border-slate-200/60">

            <div
                class="flex flex-col sm:flex-row sm:justify-between sm:items-center border-b border-slate-200/80 pb-3 gap-1">
                <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">{Your Name}</span>
                <span class="text-sm font-medium text-slate-800">{{firstname}}</span>
            </div>

            <div
                class="flex flex-col sm:flex-row sm:justify-between sm:items-center border-b border-slate-200/80 pb-3 gap-1">
                <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Dojo Location</span>
                <span
                    class="text-sm font-medium text-slate-800 px-2.5 py-0.5 bg-cyan-50 border border-cyan-100 rounded-full ">{{dojo_location}}</span>
            </div>

            <div
                class="flex flex-col sm:flex-row sm:justify-between sm:items-center border-b border-slate-200/80 pb-3 gap-1">
                <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Favorite Language</span>
                <span
                    class="text-sm font-semibold text-slate-800 px-2.5 py-0.5 bg-emerald-50 border border-emerald-100 rounded-full ">{{favorite_language}}</span>
            </div>

            <div class="flex flex-col gap-1.5">
                <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Additional Notes</span>
                <div
                    class="bg-white p-3 rounded-lg border border-slate-200 text-sm text-slate-600 leading-relaxed min-h-[60px]">
                    {{comment}}
                </div>
            </div>
        </div>

        <div class="mt-2">
            <a href="/"
                class="inline-flex items-center justify-center w-full bg-slate-800 hover:bg-slate-900 text-white font-medium py-2.5 px-4 rounded-lg transition-colors duration-200 text-sm cursor-pointer gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                    stroke="currentColor" class="w-4 h-4">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
                </svg>
                Go Back to Form
            </a>
        </div>

    </main>
</body>


</html>
