<!doctype html>

<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/styles.css" />
    <title>Document</title>
</head>

<body class="w-full min-h-screen flex justify-center items-center bg-slate-200 font-sans ">
    <main class="bg-white w-full max-w-lg p-8 shadow-2xl shadow-cyan-500/10 rounded-2xl border border-slate-100 flex flex-col gap-6">
        <header class="text-center">
            <h1 class="text-3xl text-slate-800 font-bold tracking-tight">User Information</h1>
            <p class="text-sm text-slate-500 mt-1">Please fill out the form below</p>
        </header>

        <form action="/profile" method="post" class="flex flex-col gap-5">
            <div class="flex flex-col gap-1.5">
                <label for="firstname" class="text-sm font-semibold text-slate-700">Your Name</label>
                <input 
                    type="text" 
                    name="firstname" 
                    id="firstname" 
                    placeholder="John Doe"
                    class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 transition-all text-sm" 
                />
            </div>

            <div class="flex flex-col gap-1.5">
                <label for="primary-car" class="text-sm font-semibold text-slate-700">Dojo Location</label>
                <select 
                    name="dojo_location" 
                    class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-slate-800 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 transition-all text-sm"
                >
                    <option value="" disabled selected>Dojo Location...</option>
                    <option value="San Francisco">San Francisco</option>
                    <option value="Seattle">Seattle</option>
                    <option value="New York">New York</option>
                    <option value="Los Angeles">Los Angeles</option>
                </select>
            </div>

            <div class="flex flex-col gap-1.5">
                <label for="Favorite_Language" class="text-sm font-semibold text-slate-700">Favorite Language</label>
                <select 
                    name="Favorite_Language" 
                    class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-slate-800 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 transition-all text-sm"
                >
                    <option value="" disabled selected>Select Favorite Language...</option>
                    <option value="Python">Python</option>
                    <option value="JavaScript">JavaScript</option>
                    <option value="C++">C++</option>
                    <option value="Java">Java</option>
                </select>
            </div>

            <div class="flex flex-col gap-1.5">
                <label for="comments" class="text-sm font-semibold text-slate-700">Additional Notes</label>
                <textarea 
                    name="comments" 
                    id="comments" 
                    rows="3"
                    placeholder="Tell us more..."
                    class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 transition-all text-sm resize-none"
                ></textarea>
            </div>

            <button 
                type="submit" 
                class="mt-2 w-full bg-cyan-600 hover:bg-cyan-700 text-white font-medium py-2.5 px-4 rounded-lg transition-colors duration-200 shadow-md shadow-cyan-500/20 text-sm cursor-pointer"
            >
                Submit Information
            </button>
        </form>
    </main>
</body>


</html>
